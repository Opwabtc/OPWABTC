name: OPWA CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_OPWA_TOKEN_ADDRESS: ${{ secrets.VITE_OPWA_TOKEN_ADDRESS || 'opt1sqqntcs2edrvm7gnfpc84nythlsc7sz9p2cmcf44p' }}
      VITE_PROPERTY_NFT_ADDRESS: placeholder
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
